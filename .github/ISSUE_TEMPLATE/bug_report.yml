name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: registrator_version
    attributes:
      label: Registrator version
      description: Docker image tag or version (e.g. `v8.0.0`, `latest`, `sha-abc1234`)
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      description: Output of `docker version`
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64
        - arm64
        - arm/v7
        - arm/v6
        - "386"
        - Other
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Service registry backend
      options:
        - Consul
        - ConsulKV
        - CoreDNS
        - etcd
        - etcd2
        - ZooKeeper
        - Multiple / unsure
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Registrator command
      description: Exact command used to run Registrator
      render: shell
    validations:
      required: true

  - type: textarea
    id: container_command
    attributes:
      label: Container command
      description: Exact command used to run the container being registered
      render: shell

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the current behavior and the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps needed to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: |
        Describe the operational or user impact.
        Examples: process crash, stale registrations, missed deregistration, broken health checks.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant Docker events and Registrator logs
      render: shell
