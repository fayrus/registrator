name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative solutions you've tried

  - type: dropdown
    id: backend
    attributes:
      label: Related backend (if applicable)
      options:
        - N/A
        - Consul
        - ConsulKV
        - etcd
        - ZooKeeper
        - SkyDNS2
