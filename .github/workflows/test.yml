name: Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "*.md"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...
